name: Publish Docker Images

# Manually publish the showrunner engine images to Docker Hub (yakyaksdk),
# tagged with an explicit version. Everything the build needs lives under ./show
# (the build context), so the four images are fully self-contained.
#
# Required repository secret:
#   DOCKER_HUB_PAT  - a Docker Hub Personal Access Token for the "yakyaksdk"
#                     account with read/write/push scope.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to publish (e.g. 1.2.3). Must be a new tag."
        required: true
        type: string
      dry_run:
        description: "Build only — do not log in or push to Docker Hub."
        required: false
        default: false
        type: boolean

env:
  DOCKERHUB_NAMESPACE: yakyaksdk

concurrency:
  group: publish-dockerhub-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: py,      dockerfile: show/showrunner/Dockerfile.py }
          - { name: js,      dockerfile: show/showrunner/Dockerfile.js }
          - { name: sh,      dockerfile: show/showrunner/Dockerfile.sh }
          - { name: prepare, dockerfile: show/showrunner/Dockerfile.prepare }
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push (tag by version + latest)
        uses: docker/build-push-action@v6
        with:
          context: show                  # ./show is self-contained; COPY paths assume it
          file: ${{ matrix.dockerfile }}
          push: ${{ !inputs.dry_run }}
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/showrunner-${{ matrix.name }}:${{ inputs.version }}
            ${{ env.DOCKERHUB_NAMESPACE }}/showrunner-${{ matrix.name }}:latest
