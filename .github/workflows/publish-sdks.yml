name: Publish SDKs

# Manually triggered workflow that generates the YakYak client SDKs from the live
# OpenAPI spec (https://api.yakyak.ai/api/docs-json) and publishes them:
#   - Python  -> PyPI  as "yakyak-sdk"
#   - JS/TS   -> npm   as "yakyak-sdk"
#
# The published spec has a couple of codegen-breaking quirks (a dangling $ref and
# OpenAPI-3.1 `examples` inside 3.0 schemas), so each job first downloads the spec
# and runs sdk/patch-spec.py to repair it before generating.
#
# Required repository secrets:
#   PYPI_API_TOKEN  - a PyPI API token (value starts with "pypi-")
#   NPM_TOKEN       - an npm automation/publish token
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0). Must be a new, unpublished version."
        required: true
        type: string
      target:
        description: "Which registries to publish to."
        required: true
        default: both
        type: choice
        options:
          - both
          - pypi
          - npm
      dry_run:
        description: "Build and validate only — do not actually publish."
        required: false
        default: false
        type: boolean

env:
  SPEC_URL: https://api.yakyak.ai/api/docs-json

concurrency:
  group: publish-sdks-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  publish-python:
    name: Publish Python SDK (PyPI)
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'pypi' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (required by openapi-generator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node (provides the generator CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download and patch OpenAPI spec
        run: |
          curl -fsSL "${SPEC_URL}" -o spec.json
          python3 sdk/patch-spec.py spec.json spec.patched.json

      - name: Generate Python client from OpenAPI spec
        run: |
          npx --yes @openapitools/openapi-generator-cli@2 generate \
            -i spec.patched.json \
            -g python \
            -o sdk/python \
            --skip-validate-spec \
            --git-user-id yakyak-support \
            --git-repo-id cookbook \
            --additional-properties=packageName=yakyak_sdk,projectName=yakyak-sdk,packageVersion=${{ github.event.inputs.version }},packageUrl=https://github.com/yakyak-support/cookbook,licenseInfo=Apache-2.0

      # The python generator emits only the raw *Api classes (verbose
      # workflow_controller_* names) and cannot express multipart uploads. Drop in a
      # hand-maintained YakYakClient facade (parallel to the JS one) that adds friendly
      # namespaces and ergonomic `uploads.*` helpers. Kept as a committed file (not a
      # heredoc) because module-level Python can't carry the YAML block's indentation.
      - name: Inject Python YakYakClient facade
        run: |
          cp sdk/facade/client.py sdk/python/yakyak_sdk/client.py
          printf '\nfrom .client import YakYakClient\n' >> sdk/python/yakyak_sdk/__init__.py

      - name: Build distribution
        working-directory: sdk/python
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

      - name: Dry run notice
        if: ${{ github.event.inputs.dry_run == 'true' }}
        run: echo "dry_run=true — skipped 'twine upload'. Distribution built and validated."

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-sdk-dist
          path: sdk/python/dist/*

  publish-npm:
    name: Publish JS/TS SDK (npm)
    if: ${{ github.event.inputs.target == 'both' || github.event.inputs.target == 'npm' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (required by openapi-generator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Download and patch OpenAPI spec
        run: |
          curl -fsSL "${SPEC_URL}" -o spec.json
          python3 sdk/patch-spec.py spec.json spec.patched.json

      - name: Generate TypeScript client from OpenAPI spec
        run: |
          npx --yes @openapitools/openapi-generator-cli@2 generate \
            -i spec.patched.json \
            -g typescript-fetch \
            -o sdk/javascript \
            --skip-validate-spec \
            --git-user-id yakyak-support \
            --git-repo-id cookbook \
            --additional-properties=npmName=yakyak-sdk,npmVersion=${{ github.event.inputs.version }},supportsES6=true,typescriptThreePlus=true

      - name: Fill package.json fields the generator leaves blank
        working-directory: sdk/javascript
        run: |
          npm pkg set author="YakYak Support"
          npm pkg set license="Apache-2.0"
          npm pkg set homepage="https://github.com/yakyak-support/cookbook#readme"
          npm pkg set bugs.url="https://github.com/yakyak-support/cookbook/issues"
          npm pkg set "keywords[]=yakyak" "keywords[]=sdk" "keywords[]=openapi"

      # typescript-fetch emits only per-tag *Api classes + Configuration — there is no
      # unified YakYakClient, and every method is prefixed with its Nest controller
      # name (e.g. dataControllerGetStyles). Drop in the hand-maintained facade
      # (sdk/facade/{client,uploads}.ts): it exposes the *Api classes under friendly
      # namespaces (client.data, client.workflow, ...) with the `<tag>Controller` prefix
      # stripped, accepts { baseUrl, token } for Bearer-JWT auth, and adds `client.uploads.*`
      # helpers for the multipart routes the generator can't express.
      # If the API gains/renames a tag, add the matching *Api in sdk/facade/client.ts.
      - name: Inject YakYakClient facade
        working-directory: sdk/javascript
        run: |
          cp ../facade/uploads.ts src/uploads.ts
          cp ../facade/client.ts src/client.ts
          printf "\nexport * from './client';\n" >> src/index.ts

      # The typescript-fetch generator emits a CJS build (statically un-analyzable
      # by Node's cjs-module-lexer) and a bundler-only "esm" build with no exports
      # map, so `import { YakYakClient } from "yakyak-sdk"` fails in Node ESM.
      # Bundle with tsup instead: it inlines the extensionless relative imports and
      # emits real dual CJS + ESM + a single .d.ts, wired up via an exports map.
      - name: Configure dual ESM/CJS build
        working-directory: sdk/javascript
        run: |
          npm pkg set main="./dist/index.js"
          npm pkg set module="./dist/index.mjs"
          npm pkg set types="./dist/index.d.ts"
          npm pkg set "exports[.].types"="./dist/index.d.ts"
          npm pkg set "exports[.].import"="./dist/index.mjs"
          npm pkg set "exports[.].require"="./dist/index.js"
          # Keep package.json importable (some tooling reads it); an exports map
          # otherwise blocks the "./package.json" subpath.
          npm pkg set "exports[./package.json]"="./package.json"
          npm pkg set "files[]=dist"
          npm pkg set scripts.build="tsup src/index.ts --format cjs,esm --dts --clean --sourcemap --target es2020"
          # 'prepare' (= npm run build) would fire during install before tsup exists;
          # drop it and build explicitly below.
          npm pkg delete scripts.prepare

      - name: Build package
        working-directory: sdk/javascript
        run: |
          npm install
          npm install --save-dev tsup
          npm run build

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: sdk/javascript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Dry run (npm pack)
        if: ${{ github.event.inputs.dry_run == 'true' }}
        working-directory: sdk/javascript
        run: |
          echo "dry_run=true — running 'npm publish --dry-run' instead of publishing."
          npm publish --dry-run --access public

      - name: Upload built tarball
        working-directory: sdk/javascript
        run: npm pack --pack-destination "$RUNNER_TEMP"
      - uses: actions/upload-artifact@v4
        with:
          name: npm-sdk-tarball
          path: ${{ runner.temp }}/*.tgz
